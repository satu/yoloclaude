# YoloClaude Configuration
# Edit this file to customize your sandbox environment

# Container name
container_name: yoloclaude

# Username inside container (should match host username for path compatibility)
# Leave empty to use current host username automatically
username:

# Ports to expose (host:container)
# Not needed when using Tailscale - container has its own IP
ports:

# Source directory to mount (your projects)
src_dir: ~/src

# Additional directories to mount (optional)
# Format: host_path:container_path[:ro]
# Use ~ for home directory (expands to correct path on both host and container)
extra_mounts:
  - ~/.gitconfig:~/.gitconfig:ro
  - ~/.config/git:~/.config/git:ro
  - ~/.config/gh:~/.config/gh
  - ~/.config/gcloud:~/.config/gcloud
  - ~/.config/firebase:~/.config/firebase
  - ~/.config/configstore:~/.config/configstore
  - ~/.gemini:~/.gemini
  - ~/Android:~/Android

# Container resource limits (optional, comment out to disable)
resources:
  memory: 16g
  cpus: 4
